{% extends "base.html" %}
{% block title %}参数输入 — 网格交易测算{% endblock %}
{% block content %}
<form method="POST" action="/" class="glass">
    {% if errors %}
    <div class="alert alert-danger">
        <ul class="mb-0">{% for error in errors %}<li>{{ error }}</li>{% endfor %}</ul>
    </div>
    {% endif %}

    <div class="row g-3 mb-3">
        <div class="col-md-6">
            <label class="form-label">币种</label>
            <select class="form-select" name="symbol" id="symbol" required>
                {% for s in symbols %}
                <option value="{{ s.symbol }}"
                    {% if form and form.symbol == s.symbol %}selected{% endif %}
                    {% if not form and loop.first %}selected{% endif %}
                    data-entry="{{ s.entry_price }}"
                    data-upper="{{ s.upper_price }}"
                    data-lower="{{ s.lower_price }}"
                    data-grid-size="{{ s.grid_size }}"
                    data-quantity="{{ s.quantity_per_grid }}"
                    data-capital="{{ s.capital }}">
                    {{ s.symbol }} ({{ s.name }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label">保证金模式</label>
            <div class="btn-group w-100" role="group">
                <button type="button" id="btn-cross" class="btn btn-outline-light active" onclick="setMode('cross')">全仓</button>
                <button type="button" id="btn-isolated" class="btn btn-outline-light" onclick="setMode('isolated')">逐仓</button>
            </div>
            <input type="hidden" name="margin_mode" id="margin_mode" value="{{ form.margin_mode if form else 'cross' }}">
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-6">
            <label class="form-label">初始资金</label>
            <input type="number" step="0.01" class="form-control" name="capital" id="capital" min="0" required
                   value="{{ form.capital if form else '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">杠杆</label>
            <input type="number" step="1" class="form-control" name="leverage" id="leverage" min="1" max="125" required
                   value="{{ form.leverage if form else '1' }}">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">入场价</label>
        <input type="number" step="0.01" class="form-control" name="entry_price" id="entry_price" required
               value="{{ form.entry_price if form else '' }}">
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-4">
            <label class="form-label">网格下限 (USDT)</label>
            <input type="number" step="0.01" class="form-control" name="lower_price" id="lower_price" required
                   value="{{ form.lower_price if form else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">网格上限 (USDT)</label>
            <input type="number" step="0.01" class="form-control" name="upper_price" id="upper_price" required
                   value="{{ form.upper_price if form else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">网格大小 (USDT)</label>
            <input type="number" step="0.01" class="form-control" name="grid_size" id="grid_size" required
                   value="{{ form.grid_size if form else '' }}">
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <label class="form-label">单次购买</label>
            <input type="number" step="any" class="form-control" name="quantity_per_grid" id="quantity_per_grid" min="0" required
                   value="{{ form.quantity_per_grid if form else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">网格数量</label>
            <input type="text" class="form-control-plaintext text-center" id="grid_count_preview" readonly value="-">
        </div>
        <div class="col-md-4">
            <label class="form-label">总占用</label>
            <input type="text" class="form-control-plaintext text-center" id="total_used_preview" readonly value="-">
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn-glow">▶ 开始测算</button>
        <button type="button" class="btn btn-outline-light" id="btn-save" onclick="saveConfig()">💾 保存参数</button>
    </div>
    <div id="save-toast" class="alert alert-success mt-2" style="display:none;">✓ 已保存到 config.ini</div>
</form>

<script>
function setMode(mode) {
    document.getElementById('margin_mode').value = mode;
    document.getElementById('btn-cross').classList.toggle('active', mode === 'cross');
    document.getElementById('btn-isolated').classList.toggle('active', mode === 'isolated');
}

function fillDefaults() {
    const sel = document.getElementById('symbol');
    const opt = sel.options[sel.selectedIndex];
    const entry = parseFloat(opt.dataset.entry);
    if (!document.getElementById('entry_price').value) document.getElementById('entry_price').value = entry;
    if (!document.getElementById('upper_price').value) document.getElementById('upper_price').value = opt.dataset.upper;
    if (!document.getElementById('lower_price').value) document.getElementById('lower_price').value = opt.dataset.lower;
    if (!document.getElementById('grid_size').value) document.getElementById('grid_size').value = opt.dataset.gridSize;
    if (!document.getElementById('quantity_per_grid').value) document.getElementById('quantity_per_grid').value = opt.dataset.quantity;
    if (!document.getElementById('capital').value) document.getElementById('capital').value = opt.dataset.capital;
    updatePreview();
}

function updatePreview() {
    const upper = parseFloat(document.getElementById('upper_price').value) || 0;
    const lower = parseFloat(document.getElementById('lower_price').value) || 0;
    const gridSize = parseFloat(document.getElementById('grid_size').value) || 1;
    const qty = parseFloat(document.getElementById('quantity_per_grid').value) || 0;
    const lev = parseFloat(document.getElementById('leverage').value) || 1;
    const entry = parseFloat(document.getElementById('entry_price').value) || 0;

    if (upper > lower && gridSize > 0) {
        const count = Math.ceil((upper - lower) / gridSize);
        document.getElementById('grid_count_preview').value = count + ' 格';
        const nominal = (qty * entry * count / lev);
        document.getElementById('total_used_preview').value = nominal.toFixed(2) + ' USDT';
    }
}

document.getElementById('symbol').addEventListener('change', fillDefaults);
['upper_price','lower_price','grid_size','quantity_per_grid','leverage','entry_price'].forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
});

// 保存参数到 config.ini
function saveConfig() {
    const form = document.querySelector('form');
    const data = new FormData(form);
    fetch('/save', { method: 'POST', body: data })
        .then(r => r.json())
        .then(j => {
            const toast = document.getElementById('save-toast');
            if (j.ok) {
                toast.textContent = '✓ 已保存到 config.ini';
                toast.className = 'alert alert-success mt-2';
            } else {
                toast.textContent = '✗ 保存失败：' + (j.error || '未知错误');
                toast.className = 'alert alert-danger mt-2';
            }
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        })
        .catch(e => {
            const toast = document.getElementById('save-toast');
            toast.textContent = '✗ 网络错误：' + e;
            toast.className = 'alert alert-danger mt-2';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        });
}

window.addEventListener('DOMContentLoaded', function() {
    fillDefaults();
    updatePreview();
});

{% if form and form.margin_mode == 'isolated' %}
setMode('isolated');
{% endif %}
</script>
{% endblock %}
