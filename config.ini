# 加密货币网格交易测算工具 — 配置

# ─── 数据获取配置 ───
# proxy: 币安 API 代理地址（访问 api.binance.com 需要）
# request_interval: 每次 API 请求间隔秒数（避免限流，币安限制 1200 req/min）
[api]
proxy = http://127.0.0.1:20171
request_interval = 1.0

# ─── 数据库配置 ───
[database]
path = data/klines.db

# ─── 币种缺省参数 ───
# entry_price: 参考入场价（仅作默认值，用户可修改）
# upper/lower: 默认网格上下限 (%)，相对 entry_price 的百分比
# grid_size: 默认网格间距 (USDT)
# quantity_per_grid: 单次网格购买数量缺省值
# capital: 初始资金缺省值 (USDT)
[BTCUSDT]
name = Bitcoin
entry_price = 65000
upper_pct = 10
lower_pct = 10
grid_size = 500
quantity_per_grid = 0.01
capital = 1000

[ETHUSDT]
name = Ethereum
entry_price = 3500
upper_pct = 12
lower_pct = 12
grid_size = 30
quantity_per_grid = 0.1
capital = 1000

[BNBUSDT]
name = BNB
entry_price = 600
upper_pct = 15
lower_pct = 15
grid_size = 10
quantity_per_grid = 0.5
capital = 1000
