# 加密货币网格交易测算工具 — 配置

# ─── 数据获取配置 ───
# proxy: 币安 API 代理地址（访问 api.binance.com 需要）
# request_interval: 每次 API 请求间隔秒数（避免限流，币安限制 1200 req/min）
[api]
proxy = http://127.0.0.1:20171
request_interval = 1.0

# ─── 数据库配置 ───
[database]
path = data/klines.db

# ─── 币种缺省参数 ───
# entry_price: 参考入场价（仅作默认值，用户可修改）
# upper_price: 网格上限 (USDT，具体价格)
# lower_price: 网格下限 (USDT，具体价格)
# grid_size: 默认网格间距 (USDT)
# quantity_per_grid: 单次网格购买数量缺省值
# capital: 初始资金缺省值 (USDT)
# leverage: 默认杠杆倍数（1-125）
# margin_mode: 默认保证金模式（cross=全仓 / isolated=逐仓）
[BTCUSDT]
name = Bitcoin
entry_price = 65000
upper_price = 71500
lower_price = 58500
grid_size = 500
quantity_per_grid = 0.01
capital = 1000
leverage = 1
margin_mode = cross

[ETHUSDT]
name = Ethereum
entry_price = 3500
upper_price = 3920
lower_price = 3080
grid_size = 30
quantity_per_grid = 0.1
capital = 1000
leverage = 1
margin_mode = cross

[BNBUSDT]
name = BNB
entry_price = 600
upper_price = 690
lower_price = 510
grid_size = 10
quantity_per_grid = 0.5
capital = 1000
leverage = 1
margin_mode = cross
