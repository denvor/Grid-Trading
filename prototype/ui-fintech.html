<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid calc — Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b0f;
            --surface: #12141c;
            --card: #1a1d29;
            --border: #252833;
            --text: #e1e4eb;
            --dim: #6b7280;
            --blue: #2f81f7;
            --green: #3fb950;
            --amber: #d29922;
            --red: #f85149;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 32px 20px; font-size: 14px; }
        .container { max-width: 640px; margin: 0 auto; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--blue); }
        .chain { background: var(--card); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 12px; color: var(--dim); display: flex; align-items: center; gap: 6px; }
        .chain .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

        .grid-form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 16px;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }

        .form-group label { font-size: 11px; font-weight: 500; color: var(--dim); text-transform: uppercase; letter-spacing: 0.8px; }
        .form-group input, .form-group select {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(47,129,247,0.15);
        }

        .leverage-group { display: flex; align-items: center; gap: 12px; }
        .leverage-group input[type="range"] { flex: 1; accent-color: var(--blue); }
        .leverage-value { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--blue); min-width: 48px; text-align: right; }

        .mode-toggle {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .mode-toggle button {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--dim);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-toggle button.active { background: var(--blue); color: #fff; }

        .range-slider {
            position: relative;
            height: 40px;
            margin-top: 8px;
        }
        .range-slider .track {
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            transform: translateY(-50%);
        }
        .range-slider .fill {
            position: absolute;
            top: 50%;
            left: 15%;
            right: 15%;
            height: 4px;
            background: linear-gradient(90deg, var(--red), var(--blue), var(--green));
            border-radius: 2px;
            transform: translateY(-50%);
        }
        .range-slider .mark {
            position: absolute;
            top: 50%;
            width: 12px; height: 12px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--surface);
        }
        .range-slider .mark.lower { left: 15%; background: var(--red); }
        .range-slider .mark.mid { left: 50%; background: var(--blue); }
        .range-slider .mark.upper { left: 85%; background: var(--green); }
        .range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-top: 4px; }
        .range-labels .blue { color: var(--blue); }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-primary:hover { background: #1f6feb; }
        .btn-primary:active { transform: scale(0.99); }

        /* Result page */
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 16px;
        }
        .result-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px;
        }
        .result-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }
        .mode-chip {
            background: var(--card); border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 100px;
            font-size: 11px; color: var(--dim); font-weight: 500;
        }

        .safety-panel {
            background: rgba(63,185,80,0.08);
            border: 1px solid var(--green);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .safety-panel.danger { background: rgba(248,81,73,0.08); border-color: var(--red); }
        .safety-panel.warning { background: rgba(210,153,34,0.08); border-color: var(--amber); }
        .safety-row { display: flex; align-items: center; justify-content: space-between; }
        .safety-label { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
        .safety-value { font-family: 'Space Grotesk', sans-serif; font-size: 36px; font-weight: 700; color: var(--green); }
        .safety-panel.danger .safety-value { color: var(--red); }
        .safety-panel.warning .safety-value { color: var(--amber); }
        .safety-sub { font-size: 13px; color: var(--dim); margin-top: 2px; }
        .margin-pct { font-size: 13px; color: var(--dim); text-align: right; }
        .margin-pct strong { color: var(--text); font-size: 20px; font-family: 'Space Grotesk', sans-serif; }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .metric {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }
        .metric .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .metric .value { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; }
        .metric .value.green { color: var(--green); }
        .metric .value.amber { color: var(--amber); }

        .capital-bar {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .capital-bar .labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--dim); margin-bottom: 8px; }
        .capital-bar .labels .blue { color: var(--blue); }
        .capital-bar .track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .capital-bar .fill { height: 100%; background: var(--blue); border-radius: 4px; }

        .suggestion { display: flex; gap: 10px; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
        .suggestion .icon { flex-shrink: 0; }

        .btn-secondary {
            display: inline-block;
            padding: 10px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            text-decoration: none;
            transition: border-color 0.2s;
            margin-top: 20px;
        }
        .btn-secondary:hover { border-color: var(--dim); }
    </style>
</head>
<body>
    <div class="container">
        <!-- INPUT -->
        <div class="header">
            <div class="logo">grid<span>·</span>calc</div>
            <div class="chain"><span class="dot"></span> mainnet · okx</div>
        </div>

        <div class="grid-form-card">
            <div class="form-row">
                <div class="form-group">
                    <label>币种</label>
                    <select><option>₿ BTCUSDT</option><option>⟠ ETHUSDT</option><option>⬡ BNBUSDT</option></select>
                </div>
                <div class="form-group">
                    <label>初始资金 (USDT)</label>
                    <input type="text" value="100,000.00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>保证金模式</label>
                    <div class="mode-toggle">
                        <button class="active">全仓</button>
                        <button>逐仓</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>杠杆倍数</label>
                    <div class="leverage-group">
                        <input type="range" min="1" max="125" value="5" style="flex:1">
                        <div class="leverage-value">5×</div>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>入场价 (USDT)</label>
                <input type="text" value="65,000.00">
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>网格范围</label>
                <div class="range-slider">
                    <div class="track"></div>
                    <div class="fill"></div>
                    <div class="mark lower"></div>
                    <div class="mark mid"></div>
                    <div class="mark upper"></div>
                </div>
                <div class="range-labels">
                    <span>下限: <strong style="color:var(--red)">58,500</strong></span>
                    <span class="blue">均价: <strong>65,000</strong></span>
                    <span>上限: <strong style="color:var(--green)">71,500</strong></span>
                </div>
            </div>

            <div class="form-row three">
                <div class="form-group">
                    <label>网格大小 (USDT)</label>
                    <input type="text" value="500.00">
                </div>
                <div class="form-group">
                    <label>网格数量</label>
                    <input type="text" value="26 格" style="text-align:center">
                </div>
                <div class="form-group">
                    <label>单次购买</label>
                    <input type="text" value="0.05 BTC">
                </div>
            </div>

            <button class="btn-primary">开始测算</button>
        </div>

        <!-- RESULT -->
        <div class="header" style="margin-top: 32px;">
            <div class="logo">grid<span>·</span>calc</div>
            <div style="font-size:13px; color:var(--dim);">计算完成 · 2ms</div>
        </div>

        <div class="result-card">
            <div class="result-header">
                <div class="result-title">BTCUSDT 测算结果</div>
                <div class="mode-chip">全仓 · 5×</div>
            </div>

            <div class="safety-panel">
                <div class="safety-row">
                    <div>
                        <div class="safety-label">爆仓价</div>
                        <div class="safety-value">0.00</div>
                        <div class="safety-sub">无爆仓风险</div>
                    </div>
                    <div class="margin-pct">保证金占用<strong>16.9%</strong></div>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric"><div class="label">网格数量</div><div class="value">26 格</div></div>
                <div class="metric"><div class="label">单次利润</div><div class="value green">5.00 USDT</div></div>
                <div class="metric"><div class="label">最大回撤</div><div class="value amber">50.00%</div></div>
                <div class="metric"><div class="label">单次名义</div><div class="value">3,250 USDT</div></div>
            </div>

            <div class="capital-bar">
                <div class="labels">
                    <span>资金分布</span>
                    <span><span class="blue">占用 16,900</span> / 100,000 USDT</span>
                </div>
                <div class="track"><div class="fill" style="width:16.9%"></div></div>
            </div>

            <div class="suggestion">
                <span class="icon">✓</span>
                <span>当前参数安全，可以执行。保证金占用率适中，建议关注市场波动率调整网格密度。</span>
            </div>

            <a href="ui-fintech.html" class="btn-secondary">← 重新测算</a>
            <a href="ui-fintech-danger.html" class="btn-secondary" style="margin-left:10px">查看危险场景 →</a>
        </div>
    </div>
</body>
</html>
